<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pi Global Auto - Giriş</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .auth-container {
            max-width: 440px;
            margin: 0 auto;
        }
        .auth-container .glass {
            padding: 40px 32px;
        }
        .auth-container .form-control {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            color: #eaeaea;
            padding: 14px 18px;
        }
        .auth-container .form-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }
        .auth-container .form-control::placeholder {
            color: #555;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #555;
            font-size: 0.85rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }
        .pi-login-btn {
            background: rgba(212, 175, 55, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.15);
            color: #eaeaea;
            padding: 14px;
            border-radius: 12px;
            transition: 0.2s;
            width: 100%;
        }
        .pi-login-btn:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--gold);
            color: var(--gold);
        }
        .pi-login-btn i {
            font-size: 1.4rem;
        }
        @media (max-width: 576px) {
            .auth-container .glass {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container py-5" style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
        <div class="auth-container">
            <div class="glass">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <h2 class="gold-text"><i class="bi bi-currency-bitcoin me-2"></i>Pi Auto</h2>
                    </a>
                    <p class="text-secondary mt-2">Hesabınıza giriş yapın</p>
                </div>

                <!-- Pi Login -->
                <button class="pi-login-btn" id="piLoginBtn">
                    <i class="bi bi-wallet2 me-2 gold-text"></i>
                    Pi Cüzdanı ile Giriş Yap
                </button>

                <div class="auth-divider my-4">veya</div>

                <!-- Email Login -->
                <form id="loginForm">
                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="E-posta adresi" required />
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Şifre" required />
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                            <input class="form-check-input bg-dark" type="checkbox" id="rememberMe" />
                            <label class="form-check-label text-secondary" for="rememberMe">Beni hatırla</label>
                        </div>
                        <a href="#" class="text-secondary text-decoration-none small">Şifremi unuttum</a>
                    </div>
                    <button type="submit" class="btn btn-gold w-100">Giriş Yap</button>
                </form>

                <p class="text-center text-secondary mt-3 small">
                    Hesabınız yok mu? <a href="register.html" class="gold-text text-decoration-none">Kayıt Ol</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/wallet.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Pi ile giriş
            document.getElementById('piLoginBtn').addEventListener('click', function() {
                if (typeof PiWallet !== 'undefined') {
                    PiWallet.connect().then(result => {
                        if (result) {
                            window.showToast('✅ Pi cüzdanı ile giriş başarılı!', 'success');
                            setTimeout(() => {
                                window.location.href = 'profile.html';
                            }, 1500);
                        }
                    });
                } else {
                    window.showToast('Pi Cüzdanı yükleniyor...', 'info');
                }
            });

            // Email giriş
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                window.showToast('✅ Giriş başarılı! Yönlendiriliyorsunuz...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            });
        });
    </script>
</body>
</html>
