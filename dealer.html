    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .dealer-sidebar {
            background: rgba(16, 16, 16, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .dealer-sidebar .nav-link {
            color: #b0b8c0 !important;
            padding: 12px 16px;
            border-radius: 12px;
            transition: 0.2s;
        }
        .dealer-sidebar .nav-link:hover,
        .dealer-sidebar .nav-link.active {
            background: rgba(212, 175, 55, 0.08);
            color: var(--gold) !important;
        }
        .dealer-sidebar .nav-link i {
            width: 24px;
        }
        .stat-card {
            background: rgba(16, 16, 16, 0.4);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .stat-card:hover {
            border-color: rgba(212, 175, 55, 0.2);
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
        }
        .stat-card .label {
            color: #889099;
            font-size: 0.85rem;
        }
        .listing-item {
            background: rgba(16, 16, 16, 0.3);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .listing-item:hover {
            border-color: rgba(212, 175, 55, 0.15);
        }
        .upload-area {
            border: 2px dashed rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.03);
        }
        .upload-area.dragover {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.08);
        }
        .upload-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .upload-preview .preview-item {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: #1c1a18;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .upload-preview .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upload-preview .preview-item .remove-btn {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff4444;
            color: #fff;
            border: none;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .stat-card .number {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
