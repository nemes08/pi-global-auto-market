<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pi Global Auto - Kayıt Ol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .auth-container {
            max-width: 440px;
            margin: 0 auto;
        }
        .auth-container .glass {
            padding: 40px 32px;
        }
        .auth-container .form-control {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            color: #eaeaea;
            padding: 14px 18px;
        }
        .auth-container .form-control:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }
        .auth-container .form-control::placeholder {
            color: #555;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #555;
            font-size: 0.85rem;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.06);
        }
        .role-selector {
            display: flex;
            gap: 12px;
            padding: 4px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        .role-selector .role-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #889099;
            transition: 0.2s;
        }
        .role-selector .role-btn.active {
            background: rgba(212, 175, 55, 0.15);
            color: var(--gold);
        }
        .role-selector .role-btn:hover {
            color: #eaeaea;
        }
        @media (max-width: 576px) {
            .auth-container .glass {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container py-5" style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
        <div class="auth-container">
            <div class="glass">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <h2 class="gold-text"><i class="bi bi-currency-bitcoin me-2"></i>Pi Auto</h2>
                    </a>
                    <p class="text-secondary mt-2">Yeni hesap oluşturun</p>
                </div>

                <!-- Role Selector -->
                <div class="role-selector mb-3" id="roleSelector">
                    <button class="role-btn active" data-role="buyer"><i class="bi bi-person me-1"></i> Alıcı</button>
                    <button class="role-btn" data-role="dealer"><i class="bi bi-building me-1"></i> Satıcı</button>
                </div>

                <form id="registerForm">
                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Ad Soyad" required />
                    </div>
                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="E-posta adresi" required />
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Şifre (en az 8 karakter)" required />
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Şifre tekrar" required />
                    </div>
                    <div class="mb-3">
                        <select class="form-select bg-dark text-light border-secondary">
                            <option value="">Ülke</option>
                            <option>Türkiye</option><option>Almanya</option><option>İtalya</option>
                            <option>İngiltere</option><option>ABD</option><option>Fransa</option>
                        </select>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input bg-dark" type="checkbox" id="termsCheck" required />
                        <label class="form-check-label text-secondary small" for="termsCheck">
                            <a href="#" class="gold-text text-decoration-none">Kullanım Koşulları</a> ve 
                            <a href="#" class="gold-text text-decoration-none">Gizlilik Politikası</a>'nı okudum ve kabul ediyorum.
                        </label>
                    </div>
                    <button type="submit" class="btn btn-gold w-100">Hesap Oluştur</button>
                </form>

                <p class="text-center text-secondary mt-3 small">
                    Zaten hesabınız var mı? <a href="login.html" class="gold-text text-decoration-none">Giriş Yap</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Role selector
            const roleBtns = document.querySelectorAll('.role-btn');
            roleBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    roleBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // Register form
            document.getElementById('registerForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const role = document.querySelector('.role-btn.active').dataset.role;
                window.showToast(`✅ Hesap başarıyla oluşturuldu! (${role === 'dealer' ? 'Satıcı' : 'Alıcı'})`, 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            });
        });
    </script>
</body>
</html>
