<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pi Global Auto - Profil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(145deg, #2a2826, #1a1816);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: var(--gold);
            margin: 0 auto;
            border: 3px solid rgba(212, 175, 55, 0.2);
        }
        .profile-card {
            background: rgba(16, 16, 16, 0.4);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .favorite-item {
            background: rgba(16, 16, 16, 0.3);
            border-radius: 16px;
            padding: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .favorite-item:hover {
            border-color: rgba(212, 175, 55, 0.15);
        }
    </style>
</head>
<body>
    <!-- NAVIGATION -->
    <nav class="navbar navbar-expand-xl navbar-dark fixed-top py-2">
        <div class="container-fluid px-3 px-lg-5">
            <a class="navbar-brand" href="index.html"><i class="bi bi-currency-bitcoin"></i> Pi Auto</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1 gap-lg-2">
                    <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav.home">Ana Sayfa</a></li>
                    <li class="nav-item"><a class="nav-link" href="vehicles.html" data-i18n="nav.vehicles">Araçlar</a></li>
                    <li class="nav-item"><a class="nav-link" href="dealers.html" data-i18n="nav.dealers">Bayiler</a></li>
                    <li class="nav-item"><a class="nav-link" href="auctions.html" data-i18n="nav.auctions">Açık Artırma</a></li>
                    <li class="nav-item"><a class="nav-link" href="news.html" data-i18n="nav.news">Haberler</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html" data-i18n="nav.contact">İletişim</a></li>
                </ul>
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <span class="text-secondary small me-2"><i class="bi bi-person-circle me-1"></i> Ahmet Y.</span>
                    <a href="login.html" class="btn btn-outline-silver btn-sm px-4">Çıkış</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- PROFILE -->
    <section class="pt-5 mt-5">
        <div class="container py-4">
            <div class="row g-4">
                <!-- Profile Sidebar -->
                <div class="col-lg-4">
                    <div class="profile-card text-center">
                        <div class="profile-avatar"><i class="bi bi-person"></i></div>
                        <h5 class="mt-3">Ahmet Yılmaz</h5>
                        <p class="text-secondary small">ahmet@email.com</p>
                        <span class="badge-verified"><i class="bi bi-patch-check-fill me-1"></i> Doğrulanmış Kullanıcı</span>
                        
                        <hr class="border-secondary opacity-25" />
                        
                        <div class="d-flex justify-content-around">
                            <div>
                                <div class="gold-text fw-bold">12</div>
                                <div class="text-secondary small">Favori</div>
                            </div>
                            <div>
                                <div class="gold-text fw-bold">3</div>
                                <div class="text-secondary small">Rezervasyon</div>
                            </div>
                            <div>
                                <div class="gold-text fw-bold">8</div>
                                <div class="text-secondary small">İlan</div>
                            </div>
                        </div>
                    </div>

                    <div class="profile-card mt-3">
                        <h6 class="gold-text"><i class="bi bi-wallet2 me-2"></i>Pi Cüzdanı</h6>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="text-secondary">Bakiye</span>
                            <span class="gold-text fw-bold" id="profileBalance">12,450 Pi</span>
                        </div>
                        <button class="btn btn-gold btn-sm w-100 mt-2" id="profileWalletBtn">
                            <i class="bi bi-wallet2 me-2"></i> Cüzdanı Yönet
                        </button>
                    </div>
                </div>

                <!-- Favorites -->
                <div class="col-lg-8">
                    <h5 class="gold-text"><i class="bi bi-star-fill me-2"></i>Favori Araçlarım</h5>
                    <div id="favoritesContainer">
                        <!-- JavaScript ile doldurulacak -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer-dark py-4 mt-5">
        <div class="container">
            <p class="text-center text-secondary small mb-0">© 2026 Pi Global Auto Market — Kullanıcı Profili</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/language.js"></script>
    <script src="js/wallet.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Favorileri göster
            const container = document.getElementById('favoritesContainer');
            const favorites = JSON.parse(localStorage.getItem('piAutoFavorites') || '[]');
            
            if (favorites.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5">
                        <i class="bi bi-star" style="font-size: 3rem; color: #555;"></i>
                        <p class="text-secondary mt-3">Henüz favori aracınız yok.</p>
                        <a href="vehicles.html" class="btn btn-gold btn-sm">Araçları Keşfedin</a>
                    </div>
                `;
            } else {
                const favVehicles = VEHICLES.filter(v => favorites.includes(v.id));
                container.innerHTML = favVehicles.map(v => `
                    <div class="favorite-item mb-2">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="mb-0">${v.brand} ${v.model}</h6>
                                <span class="text-secondary small">${v.year} · ${v.mileage.toLocaleString()} km</span>
                            </div>
                            <div class="d-flex gap-2">
                                <span class="price-tag">${v.price.toLocaleString()} Pi</span>
                                <a href="vehicle.html?id=${v.id}" class="btn btn-gold btn-sm">Detay</a>
                                <button class="btn btn-outline-silver btn-sm remove-fav" data-id="${v.id}">
                                    <i class="bi bi-x"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');

                // Favori kaldır
                document.querySelectorAll('.remove-fav').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const id = parseInt(this.dataset.id);
                        window.toggleFavorite(id);
                        this.closest('.favorite-item').remove();
                        if (document.querySelectorAll('.favorite-item').length === 0) {
                            location.reload();
                        }
                    });
                });
            }

            // Wallet
            document.getElementById('profileWalletBtn').addEventListener('click', function() {
                if (typeof PiWallet !== 'undefined') {
                    PiWallet.connect();
                }
            });

            // Wallet state
            if (typeof PiWallet !== 'undefined' && PiWallet.isConnected()) {
                const balance = PiWallet.getBalance();
                document.getElementById('profileBalance').textContent = `${balance.toLocaleString()} Pi`;
            }
        });
    </script>
</body>
</html>
